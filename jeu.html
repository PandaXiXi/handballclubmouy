<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HBM - Fly Ball</title>
    <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:wght@400&display=swap" rel="stylesheet">
    <style>
        :root {
            --dark: #0a0f08;
            --green-bright: #3ddc3d;
            --gold: #d4af37;
        }

        body {
            margin: 0;
            background: radial-gradient(circle at center, #1a2e15 0%, var(--dark) 100%);
            color: white;
            font-family: 'DM Sans', sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            overflow: hidden;
            touch-action: manipulation;
        }

        h1 { font-family: 'Bebas Neue', sans-serif; font-size: 3rem; color: var(--green-bright); margin: 0; }
        
        #game-canvas {
            border: 2px solid var(--green-bright);
            background: rgba(255, 255, 255, 0.03);
            border-radius: 8px;
            box-shadow: 0 0 20px rgba(0,0,0,0.5);
            max-width: 100%;
        }

        .ui { margin-top: 15px; text-align: center; }
        .score { font-family: 'Bebas Neue', sans-serif; font-size: 2rem; color: var(--gold); }
        
        .btn-back {
            margin-top: 20px;
            color: #7a9a7a;
            text-decoration: none;
            font-size: 0.8rem;
            text-transform: uppercase;
            letter-spacing: 1px;
        }
    </style>
</head>
<body>

    <h1>FLY BALL HBM</h1>
    <p style="margin-bottom: 10px;">Cliquez pour bondir et éviter les poteaux !</p>

    <canvas id="game-canvas" width="400" height="500"></canvas>

    <div class="ui">
        <div class="score">SCORE: <span id="current-score">0</span></div>
        <div style="font-size: 0.8rem; color: #7a9a7a;">RECORD: <span id="best-score">0</span></div>
    </div>
    
    <a href="index.html" class="btn-back">← Retour au site</a>

    <script>
        const canvas = document.getElementById('game-canvas');
        const ctx = canvas.getContext('2d');
        const scoreEl = document.getElementById('current-score');
        const bestEl = document.getElementById('best-score');

        // Variables de jeu
        let ballY = 250;
        let ballX = 50;
        let velocity = 0;
        let gravity = 0.25;
        let jump = -4.5;
        let score = 0;
        let bestScore = localStorage.getItem('hbm-fly-best') || 0;
        let gameActive = true;
        bestEl.innerText = bestScore;

        const pipes = [];
        const pipeWidth = 50;
        const pipeGap = 150;
        let frameCount = 0;

        function createPipe() {
            const minHeight = 50;
            const maxHeight = canvas.height - pipeGap - minHeight;
            const height = Math.floor(Math.random() * (maxHeight - minHeight + 1)) + minHeight;
            pipes.push({ x: canvas.width, top: height, passed: false });
        }

        function drawBall() {
            ctx.beginPath();
            ctx.arc(ballX, ballY, 15, 0, Math.PI * 2);
            ctx.fillStyle = "#ff8c00"; // Couleur ballon
            ctx.fill();
            ctx.strokeStyle = "white";
            ctx.lineWidth = 2;
            ctx.stroke();
            ctx.closePath();
            
            // Texture ballon
            ctx.beginPath();
            ctx.moveTo(ballX - 15, ballY);
            ctx.quadraticCurveTo(ballX, ballY - 5, ballX + 15, ballY);
            ctx.stroke();
        }

        function update() {
            if (!gameActive) return;

            velocity += gravity;
            ballY += velocity;

            if (frameCount % 90 === 0) createPipe();

            for (let i = pipes.length - 1; i >= 0; i--) {
                pipes[i].x -= 2.5;

                // Collision
                if (
                    ballX + 15 > pipes[i].x && 
                    ballX - 15 < pipes[i].x + pipeWidth &&
                    (ballY - 15 < pipes[i].top || ballY + 15 > pipes[i].top + pipeGap)
                ) {
                    gameOver();
                }

                // Score
                if (!pipes[i].passed && pipes[i].x < ballX) {
                    score++;
                    pipes[i].passed = true;
                    scoreEl.innerText = score;
                }

                if (pipes[i].x + pipeWidth < 0) pipes.splice(i, 1);
            }

            if (ballY + 15 > canvas.height || ballY - 15 < 0) gameOver();

            frameCount++;
        }

        function draw() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);

            // Dessin des poteaux (Vert HBM)
            pipes.forEach(pipe => {
                ctx.fillStyle = "#228b22";
                ctx.fillRect(pipe.x, 0, pipeWidth, pipe.top);
                ctx.fillRect(pipe.x, pipe.top + pipeGap, pipeWidth, canvas.height);
                
                // Bordure poteaux
                ctx.strokeStyle = "#3ddc3d";
                ctx.strokeRect(pipe.x, 0, pipeWidth, pipe.top);
                ctx.strokeRect(pipe.x, pipe.top + pipeGap, pipeWidth, canvas.height);
            });

            drawBall();
        }

        function loop() {
            update();
            draw();
            if (gameActive) requestAnimationFrame(loop);
        }

        function gameOver() {
            gameActive = false;
            if (score > bestScore) {
                bestScore = score;
                localStorage.setItem('hbm-fly-best', bestScore);
                bestEl.innerText = bestScore;
            }
            ctx.fillStyle = "rgba(0,0,0,0.7)";
            ctx.fillRect(0,0, canvas.width, canvas.height);
            ctx.fillStyle = "white";
            ctx.font = "40px Bebas Neue";
            ctx.textAlign = "center";
            ctx.fillText("PERDU !", canvas.width/2, canvas.height/2);
            ctx.font = "20px DM Sans";
            ctx.fillText("Cliquez pour rejouer", canvas.width/2, canvas.height/2 + 40);
        }

        function reset() {
            ballY = 250;
            velocity = 0;
            pipes.length = 0;
            score = 0;
            scoreEl.innerText = score;
            gameActive = true;
            frameCount = 0;
            loop();
        }

        window.addEventListener('mousedown', () => {
            if (gameActive) velocity = jump;
            else reset();
        });

        // Support mobile
        window.addEventListener('touchstart', (e) => {
            e.preventDefault();
            if (gameActive) velocity = jump;
            else reset();
        }, {passive: false});

        loop();
    </script>
</body>
</html>
